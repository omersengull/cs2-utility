                <div class="map-content">
                    <h2>Inferno</h2>
                </div>
            </a>
            <a href="dust2.html" class="map-card">
                <!-- RESİM NASIL DEĞİŞTİRİLİR: Kendi resminizi proje klasörüne atın, ardından aşağıdaki src="" kısmını silip örneğin src="dust2-kapak.jpg" yazın -->
                <img src="d2.webp" alt="Dust 2" loading="lazy" class="map-bg">

            <a href="nuke.html" class="map-card">
                <!-- RESİM NASIL DEĞİŞTİRİLİR: src="nuke-kapak.jpg" yapın -->

                <div class="map-content">
                    <h2>Nuke</h2>
                </div>
            </a>
            <a href="ancient.html" class="map-card">
                <!-- RESİM NASIL DEĞİŞTİRİLİR: src="ancient-kapak.jpg" yapın -->

                </div>
            </a>
            <a href="anubis.html" class="map-card">
                <!-- RESİM NASIL DEĞİŞTİRİLİR: src="anubis-kapak.jpg" yapın -->

    </main>

    <!-- Lightbox (Tam Ekran Görünüm) -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Büyük Görsel" onclick="toggleZoom(event)">
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <!-- Hafif JavaScript (Sıfır kütüphane, sadece etkileşim için) -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCap = document.getElementById('lightbox-caption');

        // Sayfadaki tüm resimlere tıklama dinleyicisi ekle
        document.querySelectorAll('.image-wrapper img').forEach(img => {
            img.onclick = () => {
                lightboxImg.src = img.src;
                lightboxImg.classList.remove('zoomed');
                lightboxCap.innerText = img.alt;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; // Kaydırmayı durdur
            };
        });

        function closeLightbox(e) {
            // Eğer resme tıklamadıysa veya çarpıya tıkladıysa kapat
            if (e.target.id === 'lightbox' || e.target.className === 'lightbox-close') {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        function toggleZoom(e) {
            e.stopPropagation(); // Lightbox kapatma olayını tetikleme
            lightboxImg.classList.toggle('zoomed');
        }

        // ESC tuşu ile kapatma
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>

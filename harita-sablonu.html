<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Utility Guide | (Harita Adı Buraya)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">CS2<span>Utility</span></div>
            <nav class="nav">
                <!-- Geri dönüş linki -->
                <a href="index.html">← Haritalara Dön</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero" style="padding-bottom: 2rem;">
            <!-- HARİTA ADI DEĞİŞTİRME -->
            <h1 style="color: var(--primary);">HARİTA ADINI BURAYA YAZIN</h1>
            <p>CT ve T taktikleri.</p>
        </section>

        <!-- === CT TARAFI === -->
        <h2 class="section-title" style="color: #4da6ff;">CT Tarafı Taktikleri</h2>
        <div class="lineup-grid" style="margin-bottom: 4rem;">
            
            <!-- LINEUP KARTI KOPYALAMAYA BURADAN BAŞLA -->
            <!-- 2, 3, 4 veya 5 resim ekleyebilirsiniz, grid otomatik ayarlanır -->
            <details class="lineup-card" name="lineup-group">
                <summary class="lineup-header">
                    <div class="header-left">
                        <span class="utility-type smoke">Smoke</span>
                        <h3>Bomba Başlığı Buraya</h3>
                    </div>
                    <span class="toggle-icon">▼</span>
                </summary>
                
                <div class="lineup-content">
                    <div class="lineup-details">
                        <p><strong>Hedef:</strong> Nereye düşüyor?</p>
                        <p><strong>Nereden:</strong> Nereden atılıyor?</p>
                        <p><strong>Teknik:</strong> Jumpthrow vs.</p>
                    </div>
                    
                    <div class="lineup-images">
                        <div class="image-wrapper">
                            <img src="" alt="Durulacak Yer" loading="lazy">
                            <span class="image-label">Görüntü 1</span>
                        </div>
                        <div class="image-wrapper">
                            <img src="" alt="Aim Noktası" loading="lazy">
                            <span class="image-label">Görüntü 2</span>
                        </div>
                        <!-- Daha fazla resim için yeni bir image-wrapper ekleyebilirsiniz -->
                        <!-- 
                        <div class="image-wrapper">
                            <img src="" alt="Buranın Notu" loading="lazy">
                            <span class="image-label">Görüntü 3</span>
                        </div> 
                        -->
                    </div>
                </div>
            </details>
            <!-- LINEUP KARTI BURADA BİTER -->

        </div>

        <!-- === T TARAFI === -->
        <h2 class="section-title" style="color: #ffcc00;">T Tarafı Taktikleri</h2>
        <div class="lineup-grid">
            
            <!-- T Tanesi Lineup Kartı Kopyalayarak Buraya Yapıştırın -->

        </div>

    </main>

    <!-- Lightbox (Tam Ekran Görünüm) -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close">&times;</span>
        <button id="lightbox-prev" class="lightbox-nav lightbox-prev" onclick="prevLightboxImage(event)">&#10094;</button>
        <img id="lightbox-img" src="" alt="Büyük Görsel" onclick="toggleZoom(event)">
        <button id="lightbox-next" class="lightbox-nav lightbox-next" onclick="nextLightboxImage(event)">&#10095;</button>
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <!-- Hafif JavaScript -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCap = document.getElementById('lightbox-caption');
        const lightboxPrev = document.getElementById('lightbox-prev');
        const lightboxNext = document.getElementById('lightbox-next');

        let currentImageArray = [];
        let currentImageIndex = 0;

        function showLightboxImage() {
            if (currentImageArray.length === 0) return;
            const img = currentImageArray[currentImageIndex];
            lightboxImg.src = img.src;
            lightboxImg.classList.remove('zoomed');
            lightboxCap.innerText = img.alt;
            
            // Eğer birden fazla resim varsa butonları göster
            lightboxPrev.style.display = currentImageArray.length > 1 ? 'block' : 'none';
            lightboxNext.style.display = currentImageArray.length > 1 ? 'block' : 'none';
        }

        // Sayfadaki tüm resimlere tıklama dinleyicisi ekle
        document.querySelectorAll('.lineup-card').forEach(card => {
            const images = Array.from(card.querySelectorAll('.image-wrapper img'));
            images.forEach((img, index) => {
                img.onclick = () => {
                    currentImageArray = images;
                    currentImageIndex = index;
                    showLightboxImage();
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden';
                };
            });
        });

        function nextLightboxImage(e) {
            if (e) e.stopPropagation();
            if (currentImageArray.length <= 1) return;
            currentImageIndex = (currentImageIndex + 1) % currentImageArray.length;
            showLightboxImage();
        }

        function prevLightboxImage(e) {
            if (e) e.stopPropagation();
            if (currentImageArray.length <= 1) return;
            currentImageIndex = (currentImageIndex - 1 + currentImageArray.length) % currentImageArray.length;
            showLightboxImage();
        }

        function closeLightbox(e) {
            if (e.target.id === 'lightbox' || e.target.className === 'lightbox-close') {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        function toggleZoom(e) {
            e.stopPropagation();
            lightboxImg.classList.toggle('zoomed');
        }

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            } else if (e.key === 'ArrowRight') {
                nextLightboxImage();
            } else if (e.key === 'ArrowLeft') {
                prevLightboxImage();
            }
        });
    </script>
</body>
</html>
